<div class="login-container">
  <div class="login-card">
    <h2>Welcome back</h2>
    <p class="subtitle">Sign in to your account</p>

    <form [formGroup]="loginForm" (ngSubmit)="login()">
      <div class="form-group">
        <label>Username</label>
        <input type="text" formControlName="username" />
        <span *ngIf="loginForm.get('username')?.invalid && loginForm.get('username')?.touched" class="error-msg">
          Min 3 characters
        </span>
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" formControlName="email" />
        <span *ngIf="loginForm.get('email')?.invalid && loginForm.get('email')?.touched" class="error-msg">
          Valid email required
        </span>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" formControlName="password" />
        <span *ngIf="loginForm.get('password')?.invalid && loginForm.get('password')?.touched" class="error-msg">
          4–16 characters
        </span>
      </div>
      <button type="submit" class="login-btn" [disabled]="loginForm.invalid">Sign In</button>
      <div *ngIf="loginerror" class="login-error">Invalid credentials. Please try again.</div>
    </form>
  </div>
</div>
