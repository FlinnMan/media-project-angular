<!-- class directives -->

<div class="posts-container">
  <div class="post-card" *ngFor="let post of postload">
    <div class="card-header">
      <div>
        <app-user-data [Date]="post.Date" [userId]="post.userId"></app-user-data>
      </div>
      <h3>{{ post.title }}</h3>
    </div>

    <div class="card-image">
      <img [src]="post.imgurl" alt="post image" />
    </div>

    <div class="card-body">
      <p class="post-text">{{ post.body }}</p>

      <div class="likes-container">
        <button class="likes-badge" (click)="postlike(post.id)">{{ post.likes }} likes</button>
      </div>

      <ng-container *ngIf="myuserservice.authenticated()">
        <div class="comments-section">
          <h6>Add comment</h6>
          <div class="comment-input-row">
            <input
              type="text"
              placeholder="Write a comment..."
              #commentInput
              (input)="(commentInput.value)"
            />
            <button
              (click)="addcomment(post, commentInput.value); commentInput.value = ''"
              [disabled]="!commentInput.value.trim()"
            >
              Post
            </button>
          </div>
        </div>
      </ng-container>

      <div class="comments-section">
        <h6>Comments</h6>
        <ul class="comment-list">
          <li class="comment-item" *ngFor="let comment of post.comments; let i = index">
            <span>{{ comment }}</span>
            <button *ngIf="myuserservice.authenticated()" (click)="deletecomment(post, i)">
              ✕
            </button>
          </li>
        </ul>
      </div>
    </div>

    <div class="card-footer">
      <button class="delete-btn" (click)="deletepost(post.id)">Delete</button>
    </div>
  </div>
  <button class="add-post-btn" *ngIf="myuserservice.authenticated()" routerLink="/addpost">
    + Add Post
  </button>
</div>
