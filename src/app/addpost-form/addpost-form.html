<div class="addpost-container">
  <h2>New Post</h2>
  <form (ngSubmit)="addpost()" #postform="ngForm">
    <div class="form-group">
      <label>Title</label>
      <input type="text" name="title" [(ngModel)]="newpost.title" #title="ngModel" required />
      <span *ngIf="title.invalid && title.touched" class="alert">Title is required</span>
    </div>
    <div class="form-group">
      <label>Body</label>
      <textarea name="body" rows="4" [(ngModel)]="newpost.body" #body="ngModel" required></textarea>
      <span *ngIf="body.invalid && body.touched" class="alert">Body is required</span>
    </div>
    <div class="form-group">
      <label>Image URL</label>
      <input type="url" name="imgurl" [(ngModel)]="newpost.imgurl" #imgurl="ngModel" required />
      <span *ngIf="imgurl.invalid && imgurl.touched" class="alert">Image URL is required</span>
    </div>
    <div class="form-actions">
      <a routerLink="/posts" class="back-btn">Back to Posts</a>
      <button type="submit" class="submit-btn" [disabled]="postform.invalid">Publish</button>
    </div>
  </form>
</div>
