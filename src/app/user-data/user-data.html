<div class="d-flex align-items-center">
  <img
    [src]="user.imgurl"
    alt="User Image"
    class="rounded-circle"
    width="50"
    height="50"
    [routerLink]="['/user', user.id]"
    style="cursor:pointer"
  />
  <div class="ms-3">
    <h5
      [routerLink]="['/posts']"
      [queryParams]="{ userId: user.id }"
      style="cursor:pointer"
    >
      {{ user.name }}
    </h5>
    <p>{{ Date | date: 'short' }}</p>
  </div>
</div>
